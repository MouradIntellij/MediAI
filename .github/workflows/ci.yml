name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mediai
          POSTGRES_USER: mediai
          POSTGRES_PASSWORD: mediai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediai -d mediai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install backend
        working-directory: backend
        run: npm install

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Migrate database
        working-directory: backend
        env:
          DATABASE_URL: postgres://mediai:mediai@localhost:5432/mediai
        run: npm run db:migrate

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:4000
        run: npm run build
