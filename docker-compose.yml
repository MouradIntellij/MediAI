services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediai
      POSTGRES_USER: mediai
      POSTGRES_PASSWORD: mediai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediai -d mediai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://mediai:mediai@postgres:5432/mediai
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8090,http://127.0.0.1:8090
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4001
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  postgres_data:
